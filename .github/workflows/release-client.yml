name: release-client-on-tag

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-client:
    runs-on: ubuntu-24.04
    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: validate gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: setup jdk
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'

      - name: make gradle wrapper executable
        run: chmod +x ./gradlew

      - name: read versions from gradle.properties
        id: versions
        run: |
          mod_version=$(grep '^mod_version=' gradle.properties | cut -d= -f2)
          minecraft_version=$(grep '^minecraft_version=' gradle.properties | head -n1 | cut -d= -f2)
          echo "mod_version=$mod_version" >> "$GITHUB_OUTPUT"
          echo "minecraft_version=$minecraft_version" >> "$GITHUB_OUTPUT"

      - name: build client jar
        run: ./gradlew :client:build

      - name: verify release jar exists
        run: |
          test -f "client/build/libs/awooing-${{ steps.versions.outputs.mod_version }}+${{ steps.versions.outputs.minecraft_version }}.jar"

      - name: create github release and upload mod jar
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            client/build/libs/awooing-${{ steps.versions.outputs.mod_version }}+${{ steps.versions.outputs.minecraft_version }}.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
